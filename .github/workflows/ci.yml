name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  baseline:
    name: Baseline CI (required)
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Sync dependencies
        run: make bootstrap

      - name: Install Playwright browsers and system deps
        run: uv run --group test playwright install --with-deps chromium firefox

      - name: Run baseline CI checks
        run: make ci-local

  runtime_optional:
    name: Runtime Popup E2E (optional)
    runs-on: ubuntu-latest
    needs: baseline
    continue-on-error: true

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Sync dependencies
        run: make bootstrap

      - name: Install Playwright browsers and system deps
        run: uv run --group test playwright install --with-deps chromium firefox

      - name: Run optional runtime popup smoke checks
        env:
          E2E_EXTENSION_RUNTIME: "1"
        run: make test-e2e-runtime
